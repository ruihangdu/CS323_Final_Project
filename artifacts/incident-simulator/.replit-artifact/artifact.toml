kind = "web"
previewPath = "/"
title = "Incident Simulator"
version = "1.0.0"
id = "artifacts/incident-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20204

[services.development]
run = "pnpm --filter @workspace/incident-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/incident-simulator", "run", "build" ]
publicDir = "artifacts/incident-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20204"
BASE_PATH = "/"
