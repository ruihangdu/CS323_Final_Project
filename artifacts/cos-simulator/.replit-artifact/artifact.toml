kind = "web"
previewPath = "/cos-simulator/"
title = "Creator HQ Incident Simulator"
version = "1.0.0"
id = "artifacts/cos-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cos-simulator/" ]
localPort = 25386

[services.development]
run = "pnpm --filter @workspace/cos-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cos-simulator", "run", "build" ]
publicDir = "artifacts/cos-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25386"
BASE_PATH = "/cos-simulator/"
